    <meta charset="UTF-8" />

    <title>Daniel Mendes - Professor & Mentor</title>
    <script type="module" crossorigin src="./assets/index-ChaBYJWK.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-82GZX0k6.css">
  </head>
  <body>
    <div id="root"></div>

    <script>
      function applyFix() {
        const form = document.querySelector('form');
        if (form && !form.dataset.fixed) {
          form.dataset.fixed = "true";
          
          // Mata o evento original do React/Formspree
          form.addEventListener('submit', async (e) => {
            e.preventDefault();
            e.stopImmediatePropagation();

            const btn = form.querySelector('button[type="submit"]');
            const originalText = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = 'Enviando...';

            const payload = {
              name: form.querySelector('[name="name"]')?.value,
              email: form.querySelector('[name="email"]')?.value,
              company: form.querySelector('[name="company"]')?.value,
              subject: form.querySelector('[name="subject"]')?.value,
              message: form.querySelector('[name="message"]')?.value,
            };

            try {
              const response = await fetch('/api/send-email', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload),
              });

              if (response.ok) {
                alert('Mensagem enviada com sucesso para o Daniel!');
                form.reset();
              } else {
                alert('Erro ao processar e-mail. Tente via WhatsApp no rodapé.');
              }
            } catch (err) {
              alert('Erro de conexão. Verifique sua internet.');
            } finally {
              btn.disabled = false;
              btn.innerHTML = originalText;
            }
          }, true); 
        }
      }
      setInterval(applyFix, 1000);
    </script>
  </body>
</html>
