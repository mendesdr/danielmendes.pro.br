<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Daniel Mendes - Professor & Mentor</title>
    <script type="module" crossorigin src="./assets/index-ChaBYJWK.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-82GZX0k6.css">
  </head>
  <body>
    <div id="root"></div>

    <script>
      function applyFix() {
        const form = document.querySelector('form');
        if (form && !form.dataset.fixed) {
          form.dataset.fixed = "true";
          
          // Remove todos os eventos antigos clonando o formulário
          const newForm = form.cloneNode(true);
          form.parentNode.replaceChild(newForm, form);
    
          newForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            e.stopPropagation();
    
            const btn = newForm.querySelector('button[type="submit"]');
            if (!btn) return;
    
            const originalText = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = 'Enviando...';
    
            const payload = {
              name: newForm.querySelector('[name="name"]')?.value,
              email: newForm.querySelector('[name="email"]')?.value,
              company: newForm.querySelector('[name="company"]')?.value,
              subject: newForm.querySelector('[name="subject"]')?.value,
              message: newForm.querySelector('[name="message"]')?.value,
            };
    
            try {
              const response = await fetch('/api/send-email', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload),
              });
    
              if (response.ok) {
                alert('Mensagem enviada com sucesso, Daniel!');
                newForm.reset();
              } else {
                const errData = await response.json();
                alert('Erro na API: ' + (errData.error || 'Verifique os logs na Vercel'));
              }
            } catch (err) {
              alert('Erro de conexão com a API. Verifique se a pasta /api subiu corretamente.');
            } finally {
              btn.disabled = false;
              btn.innerHTML = originalText;
            }
          });
          console.log("Formulário interceptado com sucesso.");
        }
      }
    
      // Executa continuamente até achar o form (React demora a renderizar)
      const timer = setInterval(applyFix, 1000);
    </script>
    
  </body>
</html>
